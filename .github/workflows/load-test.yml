name: Load Test

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      
      - name: Run load test
        run: k6 run --summary-export=results.json k6/scripts/json-server-test.js
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json