name: Smoke Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install json-server
        run: npm install -g json-server
      
      - name: Create db.json
        run: |
          echo '{
            "items": [
              { "id": 1, "name": "Laptop" },
              { "id": 2, "name": "Mouse" }
            ]
          }' > db.json
      
      - name: Start json-server
        run: |
          json-server --host 0.0.0.0 --port 3333 db.json &
          sleep 3
      
      - uses: grafana/setup-k6-action@v1
      
      - name: Run smoke test
        run: k6 run k6/scripts/json-server-test.js